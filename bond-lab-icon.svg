<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1629"/>
      <stop offset="100%" style="stop-color:#080c16"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Seesaw fulcrum -->
  <polygon points="256,400 220,340 292,340" fill="#f0a830" opacity="0.9"/>
  <!-- Seesaw board -->
  <rect x="80" y="328" width="352" height="16" rx="8" fill="#1a2340"/>
  <!-- Price circle (left) -->
  <circle cx="160" cy="280" r="55" fill="rgba(34,201,131,0.15)" stroke="#22c983" stroke-width="3"/>
  <text x="160" y="274" text-anchor="middle" fill="#22c983" font-size="22" font-weight="700" font-family="monospace">$</text>
  <text x="160" y="298" text-anchor="middle" fill="#22c983" font-size="14" font-family="monospace">PRICE</text>
  <!-- Yield circle (right) -->
  <circle cx="352" cy="280" r="55" fill="rgba(77,142,247,0.15)" stroke="#4d8ef7" stroke-width="3"/>
  <text x="352" y="274" text-anchor="middle" fill="#4d8ef7" font-size="22" font-weight="700" font-family="monospace">%</text>
  <text x="352" y="298" text-anchor="middle" fill="#4d8ef7" font-size="14" font-family="monospace">YIELD</text>
  <!-- Title -->
  <text x="256" y="180" text-anchor="middle" fill="#f0a830" font-size="52" font-weight="400" font-family="Georgia,serif">Bond Lab</text>
</svg>
